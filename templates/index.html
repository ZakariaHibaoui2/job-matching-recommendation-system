<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Matching System</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; background: #f5f5f5; }
        h1 { color: #2c3e50; }
        textarea { width: 100%; height: 120px; padding: 10px; font-size: 14px; }
        button { background: #2c3e50; color: white; padding: 10px 30px; border: none; cursor: pointer; margin-top: 10px; font-size: 16px; }
        button:hover { background: #34495e; }
        .result { background: white; padding: 15px; margin: 10px 0; border-left: 5px solid #2c3e50; }
        .score { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏆 Job Matching Recommendation System</h1>
    <p>Enter your skills and experience to find matching jobs:</p>
    <form method="POST">
        <textarea name="profile" placeholder="e.g. Python, machine learning, NLP, Flask, data analysis..."></textarea>
        <br>
        <button type="submit">Find Matching Jobs</button>
    </form>
    {% if results %}
    <h2>Top Matches:</h2>
    {% for job in results %}
    <div class="result">
        <h3>{{ job.title }}</h3>
        <p>Match Score: <span class="score">{{ job.score }}%</span></p>
    </div>
    {% endfor %}
    {% endif %}
</body>
</html>
